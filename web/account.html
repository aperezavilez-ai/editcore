<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EditCore — Mi cuenta</title>
<link rel="icon" href="/assets/favicon-32.png" />
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #0b0d12; color: #e8eaf0; display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
  .card { background: #14171f; border: 1px solid #232733; border-radius: 12px; padding: 32px; width: 420px; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #232733; font-size: 14px; }
  .row span:first-child { color: #8b909e; }
  button { margin-top: 20px; width: 100%; padding: 10px; border-radius: 8px; border: none; background: #2b3040; color: white; cursor: pointer; font-size: 14px; }
  .msg { font-size: 13px; margin-top: 14px; color: #f87171; }
</style>
</head>
<body>
  <div class="card">
    <h1>Mi cuenta EditCore</h1>
    <div id="content">Cargando...</div>
    <div id="msg" class="msg"></div>
    <button id="logoutBtn" style="display:none">Cerrar sesión</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="/assets/supabase-config.js"></script>
  <script>
    const content = document.getElementById("content");
    const msg = document.getElementById("msg");
    const logoutBtn = document.getElementById("logoutBtn");

    if (!window.supabase || typeof window.supabase.createClient !== "function") {
      content.textContent = "No se pudo cargar la librería de Supabase (revisa tu conexión o bloqueador de anuncios).";
      throw new Error("supabase-js no cargó");
    }
    const supabase = window.supabase.createClient(window.EDITCORE_SUPABASE_URL, window.EDITCORE_SUPABASE_ANON_KEY);

    async function load() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        content.textContent = "No has iniciado sesión.";
        const a = document.createElement("a");
        a.href = "/login.html";
        a.textContent = "Ir a iniciar sesión";
        a.style.color = "#5865f2";
        content.appendChild(document.createElement("br"));
        content.appendChild(a);
        return;
      }

      try {
        const res = await fetch("/api/auth/me", {
          headers: { Authorization: "Bearer " + session.access_token },
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.error || "No se pudo cargar la cuenta.";
          return;
        }
        const planLabel = { free: "Community (gratis)", pro: "Pro" }[data.organization?.plan] ?? data.organization?.plan ?? "—";
        const isPro = data.organization?.plan === "pro";
        content.innerHTML = `
          <div class="row"><span>Correo</span><span>${data.user.email ?? "—"}</span></div>
          <div class="row"><span>Organización</span><span>${data.organization?.name ?? "Sin organización asignada"}</span></div>
          <div class="row"><span>Plan</span><span>${planLabel}</span></div>
          <div class="row"><span>Rol</span><span>${data.profile?.role ?? "—"}</span></div>
          ${
            isPro
              ? ""
              : `<div style="margin-top:18px; display:flex; gap:10px;">
                  <button id="upgradeMonthlyBtn" style="flex:1; margin-top:0; background:#5865f2;">Pro mensual — $19/mes</button>
                  <button id="upgradeAnnualBtn" style="flex:1; margin-top:0; background:#5865f2;">Pro anual — $182.40/año</button>
                </div>
                <div id="upgradeMsg" class="msg"></div>`
          }
          <a id="downloadBtn" href="https://github.com/aperezavilez-ai/editcore/releases/latest" style="display:block; margin-top:18px; padding:12px; border-radius:8px; background:#2b3040; color:#e8eaf0; text-align:center; font-weight:600; text-decoration:none;">Descargar EditCore IDE</a>
          <div id="downloadVersion" style="font-size:12px; color:#8b909e; margin-top:6px; text-align:center;"></div>
          <a href="/developers.html" style="display:block; margin-top:20px; color:#5865f2; font-size:14px;">Panel de desarrolladores (API keys) →</a>
          <a href="/community.html" style="display:block; margin-top:8px; color:#5865f2; font-size:14px;">Comunidad EditCore →</a>
        `;
        logoutBtn.style.display = "block";

        if (!isPro) {
          const upgradeMsg = document.getElementById("upgradeMsg");
          async function startCheckout(interval) {
            upgradeMsg.style.color = "#8b909e";
            upgradeMsg.textContent = "Redirigiendo a Stripe...";
            try {
              const checkoutRes = await fetch("/api/billing/checkout", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: "Bearer " + session.access_token,
                },
                body: JSON.stringify({
                  interval,
                  successUrl: window.location.origin + "/account.html?upgraded=true",
                  cancelUrl: window.location.origin + "/account.html",
                }),
              });
              const checkoutData = await checkoutRes.json();
              if (!checkoutRes.ok || !checkoutData.url) {
                upgradeMsg.style.color = "#f87171";
                upgradeMsg.textContent = checkoutData.error || "No se pudo iniciar el pago.";
                return;
              }
              window.location.href = checkoutData.url;
            } catch (err) {
              upgradeMsg.style.color = "#f87171";
              upgradeMsg.textContent = "Error de red al iniciar el pago.";
            }
          }
          document.getElementById("upgradeMonthlyBtn").addEventListener("click", () => startCheckout("monthly"));
          document.getElementById("upgradeAnnualBtn").addEventListener("click", () => startCheckout("annual"));
        }

        if (new URLSearchParams(window.location.search).get("upgraded") === "true") {
          msg.style.color = "#34d399";
          msg.textContent = "¡Pago recibido! Tu plan se actualizará en unos segundos (recargá si no ves el cambio).";
        }

        fetch("https://raw.githubusercontent.com/aperezavilez-ai/editcore/main/releases/latest.json")
          .then((r) => (r.ok ? r.json() : null))
          .then((manifest) => {
            if (!manifest || !manifest.version) return;
            const versionEl = document.getElementById("downloadVersion");
            if (versionEl) versionEl.textContent = "Versión " + manifest.version + " - Windows 10/11 - 64 bits";
            const btn = document.getElementById("downloadBtn");
            if (btn && manifest.setup && manifest.setup.url) btn.href = manifest.setup.url;
          })
          .catch(() => {});
      } catch (err) {
        msg.textContent = "Error de red al consultar /api/auth/me.";
      }
    }

    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    });

    load();
  </script>
</body>
</html>
