# El canal oficial de la web de EditCore es Vercel (https://editcore.mx/, ver
# vercel.json y README.md). Este workflow queda como respaldo manual, no se
# dispara automáticamente para evitar servir una versión paralela/desactualizada
# desde GitHub Pages.
name: EditCore Web (GitHub Pages) [respaldo manual]

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar sitio web
        run: |
          pip install pillow numpy -q
          python scripts/generate-editcore-icons.py || true
          pip install fpdf2 -q
          python scripts/generate-web-pdf.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
