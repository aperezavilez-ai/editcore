name: EditCore Web (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'scripts/generate-web-pdf.py'
      - 'branding/icons/editcore-logo-source.png'
      - 'branding/icons/editcore-logo-512.png'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar sitio web
        run: |
          mkdir -p web/assets
          cp branding/icons/editcore-logo-512.png web/assets/editcore-logo.png
          pip install fpdf2 -q
          python scripts/generate-web-pdf.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
